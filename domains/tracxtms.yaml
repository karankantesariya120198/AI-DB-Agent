# =============================================================================
# Domain Configuration — TMS (Transportation Management System)
# =============================================================================
# To adapt this agent for a different domain:
#   1. Copy this file (or one from domains/) as your starting point
#   2. Edit the fields below to match your domain
#   3. Set AGENT_CONFIG=your_config.yaml in .env
#   4. Run: python app.py
# =============================================================================

# UI settings — controls what the user sees in the browser
domain:
  name: "Tracx TMS AI Agent"
  icon: "&#x1F69B;"
  description: "Ask questions about your loads, trips, drivers, customers, equipment"
  placeholder: "Ask about loads, drivers, customers, equipment..."

# LLM settings
llm:
  model: "claude-sonnet-4-20250514"
  temperature: 0.1
  max_tokens: 4096

# Database restrictions (optional)
# If include_tables is set, only these tables will be visible to the agent.
# These tables cover the dispatch grid JOINs used in LoadsController.
database:
  include_tables:
    - loads
    - load_destinations
    - load_driver_settlements
    - loads_load_driver_settlements
    - drivers
    - equipment
    - load_statuses
    - locations
    - name_addresses
    - users
    - loads_categories
    - taxes
    - loads_terminal
    - terminal
    - rate_types
    - loads_trips
    - settlements
    - name_addresses_contact_lines

# =============================================================================
# Dispatch grid views — maps each page to its visible columns
# Each column documents: the UI label, the source table.column, and the JOIN path
# =============================================================================
views:
  dispatch:
    description: "General dispatch loads grid"
    endpoint: "/dispatch"
    grid_columns:
      # --- Direct columns from loads table ---
      - field: "loads.show_id"
        label: "Load #"
        source: "loads.show_id"
      - field: "loads.ponum"
        label: "PO #"
        source: "loads.ponum"
      - field: "loads.trip_id"
        label: "Trip #"
        source: "loads.trip_id"
      - field: "loads.ship_date"
        label: "Ship Date"
        source: "loads.ship_date"
      - field: "loads.delivery_date"
        label: "Delivery Date"
        source: "loads.delivery_date"
      - field: "loads.rate"
        label: "Rate"
        source: "loads.rate"
      - field: "loads.distance"
        label: "Distance"
        source: "loads.distance"
      - field: "loads.notes"
        label: "Load Note"
        source: "loads.notes"

      # --- Columns requiring JOINs ---
      - field: "load_statuses.status_name"
        label: "Status"
        source: "load_statuses.status_name"
        join: "JOIN load_statuses ON loads.status_id = load_statuses.id"
      - field: "invoiceTo.company_name"
        label: "Invoice To Name"
        source: "name_addresses.company_name"
        join: "LEFT JOIN name_addresses AS invoiceTo ON loads.invoice_to_id = invoiceTo.id"
      # --- Customer detail columns (from name_addresses via loads.invoice_to_id) ---
      - field: "invoiceTo.contact"
        label: "Customer Contact"
        source: "name_addresses.contact"
        join: "LEFT JOIN name_addresses AS invoiceTo ON loads.invoice_to_id = invoiceTo.id"
      - field: "invoiceTo.phone"
        label: "Customer Phone"
        source: "name_addresses.phone"
      - field: "invoiceTo.email"
        label: "Customer Email"
        source: "name_addresses.email"
      - field: "invoiceTo.address_1"
        label: "Customer Address"
        source: "name_addresses.address_1"
      - field: "invoiceTo.city"
        label: "Customer City"
        source: "name_addresses.city"
      - field: "invoiceTo.province"
        label: "Customer Province"
        source: "name_addresses.province"
      - field: "invoiceTo.country"
        label: "Customer Country"
        source: "name_addresses.country"
      - field: "invoiceTo.postal_code"
        label: "Customer Postal Code"
        source: "name_addresses.postal_code"
      - field: "invoiceTo.credit_limit"
        label: "Customer Credit Limit"
        source: "name_addresses.credit_limit"
      - field: "invoiceTo.currency_type"
        label: "Customer Currency"
        source: "name_addresses.currency_type"
      - field: "invoiceTo.notes"
        label: "Customer Notes"
        source: "name_addresses.notes"
      - field: "invoiceTo.billing_address_1"
        label: "Billing Address"
        source: "name_addresses.billing_address_1"
      - field: "invoiceTo.billing_city"
        label: "Billing City"
        source: "name_addresses.billing_city"
      - field: "invoiceTo.billing_province"
        label: "Billing Province"
        source: "name_addresses.billing_province"
      - field: "invoiceTo.billing_country"
        label: "Billing Country"
        source: "name_addresses.billing_country"
      - field: "invoiceTo.billing_postal_code"
        label: "Billing Postal Code"
        source: "name_addresses.billing_postal_code"
      - field: "loads.load_total - loads.load_tax_total"
        label: "Sale $"
        source: "loads.load_total minus loads.load_tax_total"
        note: "Calculated: loads.load_total - loads.load_tax_total"
      - field: "taxes.code"
        label: "Tax"
        source: "taxes.code"
        join: "LEFT JOIN taxes ON loads.tax_code_id = taxes.id"
      - field: "loads_categories.name"
        label: "Load Category"
        source: "loads_categories.name"
        join: "LEFT JOIN loads_categories ON loads.category_id = loads_categories.id"
      - field: "creator.name"
        label: "Creator"
        source: "users.name (aliased as creator)"
        join: "JOIN users AS creator ON loads.createdby_id = creator.id"
      - field: "dispatcher.name"
        label: "Dispatcher"
        source: "users.name (aliased as dispatcher)"
        join: "LEFT JOIN users AS dispatcher ON loads.dispatcher_id = dispatcher.id"
      - field: "terminal.name"
        label: "Terminal"
        source: "terminal.name"
        join: "LEFT JOIN loads_terminal ON loads_terminal.load_id = loads.id LEFT JOIN terminal ON terminal.id = loads_terminal.terminal_id"
        note: "GROUP_CONCAT(DISTINCT terminal.name) — a load can have multiple terminals"

      # --- Driver details (via settlement pivot → drivers table) ---
      - field: "drivers.reference_name"
        label: "Driver/Carrier"
        source: "drivers.reference_name via load_driver_settlements"
        join: "LEFT JOIN loads_load_driver_settlements ON loads.id = loads_load_driver_settlements.load_id LEFT JOIN load_driver_settlements ON loads_load_driver_settlements.driver_settlement_id = load_driver_settlements.id LEFT JOIN drivers ON drivers.id = load_driver_settlements.driver_id"
        note: "GROUP_CONCAT(DISTINCT drivers.reference_name) — multiple drivers possible"
      - field: "drivers.phone"
        label: "Driver Phone"
        source: "drivers.phone via load_driver_settlements → drivers"
      - field: "drivers.email"
        label: "Driver Email"
        source: "drivers.email via load_driver_settlements → drivers"
      - field: "drivers.licence"
        label: "Driver Licence"
        source: "drivers.licence via load_driver_settlements → drivers"
      - field: "drivers.status"
        label: "Driver Status"
        source: "drivers.status via load_driver_settlements → drivers"
        note: "Active/inactive status of the driver"
      - field: "drivers.owner_operator"
        label: "Owner Operator"
        source: "drivers.owner_operator via load_driver_settlements → drivers"
        note: "Whether the driver is an owner-operator"
      - field: "drivers.payment_type"
        label: "Driver Pay Type"
        source: "drivers.payment_type via load_driver_settlements → drivers"
      - field: "drivers.city"
        label: "Driver City"
        source: "drivers.city via load_driver_settlements → drivers"
      - field: "drivers.province"
        label: "Driver Province"
        source: "drivers.province via load_driver_settlements → drivers"

      # --- Equipment details (via settlement pivot → equipment table) ---
      - field: "equipment.name"
        label: "Equipment Used"
        source: "equipment.name via load_driver_settlements"
        join: "LEFT JOIN equipment AS truck ON load_driver_settlements.truck_id = truck.id LEFT JOIN equipment AS equip1 ON load_driver_settlements.equip1_id = equip1.id LEFT JOIN equipment AS equip2 ON load_driver_settlements.equip2_id = equip2.id"
        note: "CONCAT_WS(', ', truck.name, equip1.name, equip2.name)"
      - field: "truck.name"
        label: "Truck"
        source: "equipment.name via load_driver_settlements.truck_id"
        note: "LEFT JOIN equipment AS truck ON load_driver_settlements.truck_id = truck.id"
      - field: "equip1.name"
        label: "Trailer 1"
        source: "equipment.name via load_driver_settlements.equip1_id"
        note: "LEFT JOIN equipment AS equip1 ON load_driver_settlements.equip1_id = equip1.id"
      - field: "equip2.name"
        label: "Trailer 2"
        source: "equipment.name via load_driver_settlements.equip2_id"
        note: "LEFT JOIN equipment AS equip2 ON load_driver_settlements.equip2_id = equip2.id"
      - field: "truck.licence_plate"
        label: "Truck Plate"
        source: "equipment.licence_plate via load_driver_settlements.truck_id"
      - field: "truck.vin"
        label: "Truck VIN"
        source: "equipment.vin via load_driver_settlements.truck_id"
      - field: "truck.model"
        label: "Truck Model"
        source: "equipment.model via load_driver_settlements.truck_id"
      - field: "truck.fuel_type"
        label: "Fuel Type"
        source: "equipment.fuel_type via load_driver_settlements.truck_id"
      - field: "truck.status"
        label: "Truck Status"
        source: "equipment.status via load_driver_settlements.truck_id"

      # --- Settlement columns ---
      - field: "SUM(load_driver_settlements.total_amount)"
        label: "Settlement $"
        source: "load_driver_settlements.total_amount"
        join: "Via loads_load_driver_settlements pivot"
        note: "SUM(load_driver_settlements.total_amount)"
      - field: "load_driver_settlements.pay_amount"
        label: "Driver Pay"
        source: "load_driver_settlements.pay_amount"
        join: "Via loads_load_driver_settlements pivot"
      - field: "load_driver_settlements.fsc_amount"
        label: "Driver FSC"
        source: "load_driver_settlements.fsc_amount"
        join: "Via loads_load_driver_settlements pivot"
      - field: "load_driver_settlements.shift_started_at"
        label: "Start Shift"
        source: "load_driver_settlements.shift_started_at"
        join: "Via loads_load_driver_settlements pivot"
      - field: "load_driver_settlements.shift_end_at"
        label: "End Shift"
        source: "load_driver_settlements.shift_end_at"
        join: "Via loads_load_driver_settlements pivot"
      - field: "TIMESTAMPDIFF(MINUTE, shift_started_at, shift_end_at)"
        label: "Shift Hours"
        note: "Computed: TIMESTAMPDIFF between Start Shift and End Shift, formatted as HH:MM"
      - field: "load_driver_settlements.confirmed_at"
        label: "Driver Confirmed At"
        source: "load_driver_settlements.confirmed_at"
        join: "Via loads_load_driver_settlements pivot"

    # Columns from load_destinations + locations (Shipper = first stop, Consignee = last stop)
    destination_columns:
      - field: "locations.company_name"
        label: "Pick Up"
        source: "locations.company_name via load_destinations WHERE stop_order is lowest"
        join: "JOIN load_destinations ON load_destinations.load_id = loads.id JOIN locations ON locations.id = load_destinations.location_id"
        note: "Shipper = first stop (ORDER BY stop_order ASC LIMIT 1)"
      - field: "locations.city"
        label: "PickUp City"
        source: "locations.city from first stop"
      - field: "locations.company_name"
        label: "Drop Off"
        source: "locations.company_name via load_destinations WHERE stop_order is highest"
        note: "Consignee = last stop (ORDER BY stop_order DESC LIMIT 1)"
      - field: "locations.city"
        label: "DropOff City"
        source: "locations.city from last stop"
      - field: "load_destinations.commodity_name"
        label: "Commodity"
        note: "GROUP_CONCAT(DISTINCT load_destinations.commodity_name)"
      - field: "CONCAT(locations.city, ', ', locations.province)"
        label: "Shipper Location"
        note: "City + Province of the first stop (shipper)"
      - field: "CONCAT(locations.city, ', ', locations.province)"
        label: "Consignee Location"
        note: "City + Province of the last stop (consignee)"
      - field: "route_timeliness"
        label: "Route Timeliness"
        note: "Computed per stop: 1=arrived&departed, 2=in progress, 3=pending, 4=not started"

