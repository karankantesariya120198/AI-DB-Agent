        source: "name_addresses.address_2"
      - field: "name_addresses.city"
        label: "City"
        source: "name_addresses.city"
      - field: "name_addresses.province"
        label: "Province/State"
        source: "name_addresses.province"
      - field: "name_addresses.country"
        label: "Country"
        source: "name_addresses.country"
      - field: "name_addresses.postal_code"
        label: "Postal Code"
        source: "name_addresses.postal_code"
      - field: "name_addresses.billing_address_1"
        label: "Billing Address"
        source: "name_addresses.billing_address_1"
      - field: "name_addresses.billing_address_2"
        label: "Billing Address 2"
        source: "name_addresses.billing_address_2"
      - field: "name_addresses.billing_city"
        label: "Billing City"
        source: "name_addresses.billing_city"
      - field: "name_addresses.billing_province"
        label: "Billing Province"
        source: "name_addresses.billing_province"
      - field: "name_addresses.billing_country"
        label: "Billing Country"
        source: "name_addresses.billing_country"
      - field: "name_addresses.billing_postal_code"
        label: "Billing Postal Code"
        source: "name_addresses.billing_postal_code"
      - field: "name_addresses.credit_limit"
        label: "Credit Limit"
